server {
    listen 80;
    server_name _;

    # Serve built React frontend
    root /home/ubuntu/peer-service-marketplace/frontend/dist;
    index index.html;

    # Proxy API requests to Django/Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve Django media files (uploads)
    location /media/ {
        alias /home/ubuntu/peer-service-marketplace/backend/media/;
    }

    # Serve Django static files (admin, etc.)
    location /static/ {
        alias /home/ubuntu/peer-service-marketplace/backend/staticfiles/;
    }

    # React SPA — send all other requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
